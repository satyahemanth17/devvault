version: '3.8'

services:
  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: satya
      POSTGRES_DB: devvault
      POSTGRES_HOST_AUTH_METHOD: trust
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U satya -d devvault"]
      interval: 5s
      timeout: 5s
      retries: 5

  backend:
    build: ./backend
    ports:
      - "5002:5002"
    environment:
      DATABASE_URL: postgresql://satya@postgres:5432/devvault
      JWT_SECRET: ${JWT_SECRET:-devvault-dev-secret}
      GITHUB_CLIENT_ID: ${GITHUB_CLIENT_ID}
      GITHUB_CLIENT_SECRET: ${GITHUB_CLIENT_SECRET}
      GITHUB_CALLBACK_URL: ${GITHUB_CALLBACK_URL:-http://localhost:5002/api/auth/github/callback}
      FRONTEND_URL: ${FRONTEND_URL:-http://localhost:3002}
      PORT: 5002
    depends_on:
      postgres:
        condition: service_healthy

volumes:
  postgres_data:
